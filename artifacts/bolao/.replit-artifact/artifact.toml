kind = "web"
previewPath = "/"
title = "Bolão da Copa"
version = "1.0.0"
id = "artifacts/bolao"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23839

[services.development]
run = "pnpm --filter @workspace/bolao run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/bolao", "run", "build" ]
publicDir = "artifacts/bolao/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23839"
BASE_PATH = "/"
